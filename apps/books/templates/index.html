<!DOCTYPE html>
<html>
<head>
    <title>{{ title }}</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: linear-gradient(135deg,#f5f7fa,#c3cfe2);
            margin: 0;
            padding: 0;
        }

        .container {
            margin-top: 100px;
        }

        h1 {
            color: #333;
            font-size: 40px;
        }

        .image-box {
            margin-top: 40px;
        }

        img {
            width: 300px;
            border-radius: 10px;
            box-shadow: 0px 8px 20px rgba(0,0,0,0.2);
        }

        .footer {
            margin-top: 50px;
            color: #555;
        }
    </style>

</head>

<body>

<div class="container">

<h1>Welcome to {{ title }}</h1>

<div class="image-box">
<img src="/static/books.jpg" alt="Books">
</div>

<div class="footer">
<p>Deployed using GitOps | ArgoCD | Kubernetes | AWS EKS</p>
</div>

</div>

</body>
</html>
