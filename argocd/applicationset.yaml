apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: multi-app
  namespace: argocd

spec:
  generators:
  - git:
      repoURL: https://github.com/ManmathGantayat/gitops-multi-app-demo.git
      revision: HEAD
      directories:
      - path: k8s-manifests/*

  template:
    metadata:
      name: '{{path.basename}}'

    spec:
      project: default

      source:
        repoURL: https://github.com/ManmathGantayat/gitops-multi-app-demo.git
        targetRevision: HEAD
        path: '{{path}}'

      destination:
        server: https://kubernetes.default.svc
        namespace: '{{path.basename}}'

      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
        - CreateNamespace=true
