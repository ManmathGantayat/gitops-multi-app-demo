apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: apps-ingress
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:

      - path: /books(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: books-service
            port:
              number: 80

      - path: /travel(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: travel-service
            port:
              number: 80

      - path: /cars(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: cars-service
            port:
              number: 80

      - path: /temple(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: temple-service
            port:
              number: 80

      - path: /bike(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: bike-service
            port:
              number: 80
